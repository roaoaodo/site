<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>крутой кот</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #e0e0e0;
      font-family: 'Courier New', Courier, monospace;
      min-height: 100vh;
      padding: 32px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 220px;
      grid-template-rows: auto auto;
      gap: 32px;
      max-width: 960px;
      margin: 0 auto;
    }

    .main-section {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .main-label {
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      letter-spacing: 2px;
      text-transform: lowercase;
    }

    .main-img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
      border: 1px solid #222;
    }

    .description {
      font-size: 15px;
      line-height: 1.8;
      color: #aaa;
      white-space: pre-wrap;
      border-top: 1px solid #1e1e1e;
      padding-top: 18px;
    }

    .sidebar {
      grid-column: 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .side-img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      border: 1px solid #222;
    }

    .side-text {
      font-size: 13px;
      line-height: 1.7;
      color: #aaa;
      white-space: pre-wrap;
      border-top: 1px solid #1e1e1e;
      padding-top: 12px;
    }

    @media (max-width: 600px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .sidebar {
        grid-column: 1;
        grid-row: auto;
        flex-direction: row;
      }
      .side-img {
        width: 48%;
        aspect-ratio: 1 / 1;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="main-section">
      <div class="main-label">крутой кот</div>
      <img class="main-img" src="cat.jpg" alt="крутой кот">
      <div class="description" id="text-content">загрузка текста...</div>
    </div>

    <div class="sidebar">
      <img class="side-img" src="cat1.jpg" alt="кот 1">
      <img class="side-img" src="cat2.jpg" alt="кот 2">
      <img class="side-img" src="cat3.jpg" alt="кот 3">
      <img class="side-img" src="cat4.jpg" alt="кот 4">
      <div class="side-text" id="text1-content"></div>
    </div>
  </div>

  <script>
    fetch('text.txt')
      .then(r => r.text())
      .then(t => {
        document.getElementById('text-content').textContent = t;
      })
      .catch(() => {
        document.getElementById('text-content').textContent = 'текст не найден';
      });

    fetch('text1.txt')
      .then(r => r.text())
      .then(t => {
        document.getElementById('text1-content').textContent = t;
      })
      .catch(() => {
        document.getElementById('text1-content').textContent = '';
      });
  </script>
</body>
</html>
