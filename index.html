<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>миша</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Unbounded:wght@300;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080808;
      --card: #111111;
      --border: #222222;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #ff2e2e;
      --mono: 'Space Mono', monospace;
      --display: 'Unbounded', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow-x: hidden;
    }

    /* ── grid bg ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,46,46,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,46,46,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── noise grain ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: .6;
    }

    .wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 64px 20px 80px;
      gap: 24px;
    }

    /* ── top bar ── */
    .topbar {
      width: 100%;
      max-width: 560px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
    }
    .topbar .logo {
      font-family: var(--display);
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .topbar .ts {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: .08em;
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
      padding: 36px 36px 32px;
    }

    .name-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      margin-bottom: 6px;
    }
    .name {
      font-family: var(--display);
      font-weight: 600;
      font-size: 36px;
      line-height: 1;
      letter-spacing: -.02em;
      color: #fff;
    }
    .age-tag {
      font-size: 11px;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 2px 8px;
      margin-bottom: 4px;
      letter-spacing: .08em;
    }

    .job {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    /* ── file block ── */
    .file-block {
      width: 100%;
      max-width: 560px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .file-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: #0e0e0e;
    }
    .file-dot {
      width: 8px; height: 8px;
      background: var(--accent);
    }
    .file-name {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .file-status {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
    }

    .file-content {
      padding: 20px;
      font-size: 13px;
      line-height: 1.75;
      color: #aaa;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 80px;
    }
    .file-content.loading {
      color: var(--muted);
      font-style: italic;
    }
    .file-content.error {
      color: #663333;
    }

    /* ── footer ── */
    .footer {
      font-size: 10px;
      color: #2a2a2a;
      letter-spacing: .08em;
    }

    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
      .name { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span class="logo">bio</span>
    <span class="ts" id="ts">—</span>
  </div>

  <div class="card">
    <div class="name-row">
      <span class="name">миша</span>
      <span class="age-tag">26</span>
    </div>
    <div class="job">ютубер</div>
    <div class="divider"></div>
    <div style="font-size:12px; color:#444; letter-spacing:.06em; line-height:1.8;">
      <div style="margin-bottom:6px;"><span style="color:#333;">//</span> добро пожаловать</div>
    </div>
  </div>

  <div class="file-block">
    <div class="file-header">
      <div class="file-dot"></div>
      <span class="file-name">exteragram.txt</span>
      <span class="file-status" id="file-status">загрузка...</span>
    </div>
    <pre class="file-content loading" id="file-content">загрузка файла...</pre>
  </div>

  <div class="footer">© миша — 2026</div>
</div>

<script>
  // timestamp
  const ts = document.getElementById('ts')
  const now = new Date()
  ts.textContent = now.toLocaleDateString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric'})

  // load EXTERAGRAM.txt — tries same-origin first (works on GitHub Pages)
  async function loadFile() {
    const el = document.getElementById('file-content')
    const st = document.getElementById('file-status')
    try {
      const res = await fetch('./EXTERAGRAM.txt')
      if (!res.ok) throw new Error(res.status)
      const text = await res.text()
      el.textContent = text
      el.classList.remove('loading', 'error')
      st.textContent = 'ok'
      st.style.color = '#2a5'
    } catch(e) {
      el.textContent = 'файл не найден — положи EXTERAGRAM.txt рядом с index.html'
      el.classList.remove('loading')
      el.classList.add('error')
      st.textContent = 'ошибка'
      st.style.color = '#633'
    }
  }
  loadFile()
</script>
</body>
</html>
